services:
  db:
    image: postgres:16-alpine
    container_name: turnike_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: turnike_dev
    ports:
      - "6342:5432"
    volumes:
      - turnike_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d turnike_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  turnike_db_data:
