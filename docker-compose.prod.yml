services:
  db:
    image: postgres:16-alpine
    container_name: turnike_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - turnike_prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    image: ghcr.io/bkeskin53/turnike_app:latest

    container_name: turnike_migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      db:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"
  
  seed:
    image: ghcr.io/bkeskin53/turnike_app:latest

    container_name: turnike_seed
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["npx", "prisma", "db", "seed"]
    restart: "no"

  app:
    image: ghcr.io/bkeskin53/turnike_app:latest
    container_name: turnike_app
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:?AUTH_COOKIE_NAME is required}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:?AUTH_COOKIE_SECURE is required}

      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:?DEV_BYPASS_AUTH is required}
      DEMO_MODE: ${DEMO_MODE:?DEMO_MODE is required}

      # --- Integration API (prod) ---
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY:?INTEGRATION_API_KEY is required}
      INTEGRATION_MAX_BATCH_SIZE: ${INTEGRATION_MAX_BATCH_SIZE:-500}
      INTEGRATION_IP_ALLOWLIST: ${INTEGRATION_IP_ALLOWLIST:-}
      INTEGRATION_TRUST_PROXY: ${INTEGRATION_TRUST_PROXY:-0}
    ports:
      - "3000:3000"
    depends_on:
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  turnike_prod_db_data:
